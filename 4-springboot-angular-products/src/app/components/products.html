<h2>{{title}}</h2>
@if(products.length > 0){
<table class="table table-striped table-hover">
    <thead>
        <tr>
            <th>Id</th>
            <th>Nombre</th>
            <th>Descripcion</th>
            <th>Precio</th>
            <th>Update</th>
            <th>Remove</th>
        </tr>
    </thead>
    <tbody>
        @for(product of products; track product.id) {
        <tr>
            <td>{{product.id}}</td>
            <td>{{product.name}}</td>
            <td>{{product.description}}</td>
            <td>{{product.price}}</td>
            <td><button class="btn btn-warning" 
                (click)="onUpdateProduct(product)">Update</button></td>
            <td><button class="btn btn-danger" 
                (click)="onRemoveProduct(product.id)">Remove</button></td>
        </tr>
    }
    </tbody>
</table>
}@else {
    <div class="alert alert-danger"> No hay productos disponibles </div>
}
